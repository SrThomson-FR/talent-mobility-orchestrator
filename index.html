<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talent Mobility Orchestrator — Christian Rojas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* ── TOKENS ─────────────────────────────────────────── */
  :root {
    --bg:             #F4F5FB;
    --surface:        #FFFFFF;
    --surface-2:      #ECEEF7;
    --border:         #D8DCF0;
    --text-primary:   #0F1340;
    --text-secondary: #4A5080;
    --text-muted:     #8890B8;
    --accent:         #2D3FBE;
    --accent-light:   #E0E4F9;
    --accent-dark:    #1A2578;
    --purple:         #7B2FBE;
    --purple-light:   #F0E6FA;
    --purple-dark:    #4A1580;
    --amber:          #A05C10;
    --amber-light:    #FEF0DC;
    --gradient:       linear-gradient(135deg, #2D3FBE 0%, #7B2FBE 100%);
    --gradient-soft:  linear-gradient(135deg, #E0E4F9 0%, #F0E6FA 100%);
    --shadow-sm:      0 1px 3px rgba(45,63,190,0.07), 0 1px 2px rgba(45,63,190,0.04);
    --shadow-md:      0 4px 20px rgba(45,63,190,0.12);
    --shadow-glow:    0 0 0 3px rgba(45,63,190,0.18);
    --radius-sm:      6px;
    --radius-md:      12px;
    --radius-lg:      20px;
    --font-sans:      'DM Sans', sans-serif;
    --font-mono:      'DM Mono', monospace;
    --nav-h:          56px;
  }

  [data-theme="dark"] {
    --bg:             #0B0D1A;
    --surface:        #131629;
    --surface-2:      #1C2038;
    --border:         #272B4A;
    --text-primary:   #E8EAFA;
    --text-secondary: #8890B8;
    --text-muted:     #4A5080;
    --accent:         #6B7EFF;
    --accent-light:   #1A2050;
    --accent-dark:    #C0C8FF;
    --purple:         #B06AE0;
    --purple-light:   #2A1545;
    --purple-dark:    #E8CCFF;
    --amber:          #F0A030;
    --amber-light:    #2A1C08;
    --gradient:       linear-gradient(135deg, #6B7EFF 0%, #B06AE0 100%);
    --gradient-soft:  linear-gradient(135deg, #1A2050 0%, #2A1545 100%);
  }

  /* ── RESET ──────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── NAV ────────────────────────────────────────────── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .nav-brand {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.04em;
  }
  .nav-brand span {
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 500;
  }
  .nav-controls { display: flex; align-items: center; gap: 0.5rem; }
  .nav-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .nav-btn.active {
    background: var(--gradient);
    color: #fff;
    border-color: transparent;
  }
  .theme-toggle {
    width: 32px; height: 32px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ── MAIN LAYOUT ────────────────────────────────────── */
  .app {
    display: grid;
    grid-template-columns: 360px 1fr;
    height: 100vh;
    padding-top: var(--nav-h);
  }

  /* ── LEFT: CHAT PANEL ───────────────────────────────── */
  .chat-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: calc(100vh - var(--nav-h));
    overflow: hidden;
  }

  .chat-header {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
  }
  .chat-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.3;
  }
  .chat-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* messages */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    max-width: 92%;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }

  .msg-bubble {
    padding: 0.65rem 0.9rem;
    border-radius: var(--radius-md);
    font-size: 13.5px;
    line-height: 1.55;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--gradient);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.agent .msg-bubble {
    background: var(--surface-2);
    color: var(--text-primary);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .msg.agent .msg-bubble strong { color: var(--accent); }
  .msg.agent .msg-bubble h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin: 0.5rem 0 0.25rem;
  }
  .msg.agent .msg-bubble ul {
    padding-left: 1.1rem;
    margin: 0.25rem 0;
  }
  .msg.agent .msg-bubble li { margin-bottom: 0.2rem; }
  .msg.agent .msg-bubble p { margin-bottom: 0.35rem; }
  .msg.agent .msg-bubble p:last-child { margin-bottom: 0; }

  .msg-time {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 0.25rem;
  }

  /* typing indicator */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 0.65rem 0.9rem;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing-indicator.visible { display: flex; }
  .typing-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* chat input */
  .chat-input-area {
    padding: 0.875rem 1.25rem 1rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .chat-input-row {
    display: flex;
    gap: 0.5rem;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0.6rem 0.875rem;
    font-family: var(--font-sans);
    font-size: 13.5px;
    color: var(--text-primary);
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .chat-input::placeholder { color: var(--text-muted); }
  .chat-input:focus { border-color: var(--accent); box-shadow: var(--shadow-glow); }
  .send-btn {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    background: var(--gradient);
    border: none;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 12px rgba(123,47,190,0.25);
  }
  .send-btn:hover { opacity: 0.88; box-shadow: 0 4px 20px rgba(123,47,190,0.35); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }

  .chat-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 0.5rem;
    font-family: var(--font-mono);
    text-align: center;
  }

  /* ── RIGHT: DATA PANEL ──────────────────────────────── */
  .data-panel {
    display: flex;
    flex-direction: column;
    height: calc(100vh - var(--nav-h));
    overflow: hidden;
    background: var(--bg);
  }

  .data-header {
    padding: 1.25rem 1.5rem 0;
    flex-shrink: 0;
  }
  .data-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .data-title-block {}
  .data-eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.2rem;
  }
  .data-title {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
  .data-title em {
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: italic;
    font-weight: 400;
  }

  .stats-row {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0.5rem 0.875rem;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .stat-num {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 500;
    background: var(--gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* tabs */
  .data-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.6rem 1.25rem;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* search */
  .search-bar {
    padding: 0.875rem 1.5rem;
    flex-shrink: 0;
    background: var(--bg);
  }
  .search-input-wrap {
    position: relative;
  }
  .search-input-wrap svg {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    width: 14px; height: 14px;
    color: var(--text-muted);
  }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0.6rem 0.875rem 0.6rem 2.25rem;
    font-family: var(--font-sans);
    font-size: 13.5px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: var(--shadow-glow); }

  /* data grid */
  .data-grid {
    flex: 1;
    overflow-y: auto;
    padding: 0 1.5rem 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.75rem;
    align-content: start;
  }
  .data-grid::-webkit-scrollbar { width: 4px; }
  .data-grid::-webkit-scrollbar-track { background: transparent; }
  .data-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }
  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 0.25rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-role {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.625rem;
  }
  .card-badges { display: flex; flex-wrap: wrap; gap: 4px; }
  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .badge-accent { background: var(--accent-light); color: var(--accent); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }
  .badge-amber  { background: var(--amber-light);  color: var(--amber); }
  .badge-muted  { background: var(--surface-2); color: var(--text-muted); border: 1px solid var(--border); }

  /* position cards */
  .pos-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .pos-card:hover {
    border-color: var(--purple);
    box-shadow: 0 4px 20px rgba(123,47,190,0.12);
    transform: translateY(-2px);
  }
  .pos-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 0.3rem;
    line-height: 1.3;
  }
  .pos-area {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }
  .pos-desc {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 13px;
  }
  .empty-state svg {
    width: 32px; height: 32px;
    margin-bottom: 0.75rem;
    opacity: 0.4;
  }

  /* loading skeleton */
  .skeleton {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── QUICK PROMPTS ──────────────────────────────────── */
  .quick-prompts {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    padding: 0 1.25rem 0.75rem;
    flex-shrink: 0;
  }
  .quick-prompts-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.15rem;
  }
  .quick-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .quick-chip {
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .quick-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  /* ── NINE BOX COLOR MAP ─────────────────────────────── */
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-brand">Christian Rojas · <span>Learning Architect</span></div>
  <div class="nav-controls">
    <button class="nav-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="nav-btn" id="lang-es" onclick="setLang('es')">ES</button>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">◐</button>
  </div>
</nav>

<!-- APP -->
<div class="app">

  <!-- LEFT: CHAT -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-eyebrow">CASE STUDY 05</div>
      <div class="chat-title" id="chat-title">AI Talent Strategist</div>
      <div class="chat-subtitle" id="chat-subtitle">Ask about positions or explore growth paths</div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <!-- welcome message injected by JS -->
    </div>

    <div id="typing-wrap" style="padding: 0 1.25rem 0.5rem; flex-shrink:0;">
      <div class="typing-indicator" id="typing">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="quick-prompts" id="quick-prompts">
      <div class="quick-prompts-label" id="qp-label">Try asking</div>
      <div class="quick-chips" id="quick-chips"></div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea
          class="chat-input"
          id="chat-input"
          rows="1"
          placeholder="Ask about a role or an employee..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="chat-hint" id="chat-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>

  <!-- RIGHT: DATA PANEL -->
  <div class="data-panel">
    <div class="data-header">
      <div class="data-header-top">
        <div class="data-title-block">
          <div class="data-eyebrow">TALENT INTELLIGENCE</div>
          <div class="data-title" id="data-title">Internal <em>mobility</em> data</div>
        </div>
      </div>

      <div class="stats-row" id="stats-row">
        <div class="stat-chip">
          <div class="stat-num" id="stat-employees">—</div>
          <div class="stat-label" id="stat-emp-label">Employees</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" id="stat-positions">—</div>
          <div class="stat-label" id="stat-pos-label">Open positions</div>
        </div>
        <div class="stat-chip">
          <div class="stat-num" id="stat-highpot">—</div>
          <div class="stat-label" id="stat-hp-label">High potential</div>
        </div>
      </div>

      <div class="data-tabs">
        <button class="tab-btn active" id="tab-employees" onclick="switchTab('employees')" data-en="Employees" data-es="Empleados">Employees</button>
        <button class="tab-btn" id="tab-positions" onclick="switchTab('positions')" data-en="Open Positions" data-es="Vacantes">Open Positions</button>
      </div>
    </div>

    <div class="search-bar">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input class="search-input" id="search-input" type="text"
          placeholder="Search by name, role, or skill..."
          oninput="filterData()" />
      </div>
    </div>

    <div class="data-grid" id="data-grid">
      <!-- cards injected by JS -->
    </div>
  </div>

</div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  const SUPABASE_URL  = 'https://mtwkdvxhhvncqmeufswe.supabase.co';
  const SUPABASE_KEY  = 'YOUR_ANON_KEY_HERE';
  const WEBHOOK_URL   = 'https://christian-rojas.app.n8n.cloud/webhook/talent-mobility-agent';

  // ── STATE ───────────────────────────────────────────────
  let sessionId   = crypto.randomUUID();
  let currentTab  = 'employees';
  let employees   = [];
  let positions   = [];
  let lang        = 'en';
  let isLoading   = false;

  // ── i18n ────────────────────────────────────────────────
  const i18n = {
    en: {
      chatTitle:      'AI Talent Strategist',
      chatSubtitle:   'Ask about positions or explore growth paths',
      dataTitle:      'Internal <em>mobility</em> data',
      searchEmp:      'Search by name, role, or skill...',
      searchPos:      'Search by title or area...',
      empLabel:       'Employees',
      posLabel:       'Open positions',
      hpLabel:        'High potential',
      qpLabel:        'Try asking',
      hint:           'Enter to send · Shift+Enter for new line',
      welcome:        "Hello! I'm your AI Talent Strategist.\n\nI can help you in two ways:\n\n**Fill a position** — tell me about an open role and I'll rank the best internal candidates.\n\n**Grow an employee** — give me a name and I'll show you which roles they're best positioned for.\n\nWhich would you like to explore?",
      quickChips:     ['Fill a position', 'Grow an employee', 'Show CS vacancies', 'Analyze Ana Torres'],
      cardClick:      (name) => `Show growth options for ${name}`,
      posClick:       (title) => `I want to fill the ${title} position. Search for candidates directly, skip listing positions.`,
      emptyEmp:       'No employees match your search',
      emptyPos:       'No positions match your search',
    },
    es: {
      chatTitle:      'AI Talent Strategist',
      chatSubtitle:   'Pregunta sobre posiciones o explora rutas de crecimiento',
      dataTitle:      'Datos de <em>movilidad</em> interna',
      searchEmp:      'Buscar por nombre, cargo o habilidad...',
      searchPos:      'Buscar por título o área...',
      empLabel:       'Empleados',
      posLabel:       'Vacantes abiertas',
      hpLabel:        'Alto potencial',
      qpLabel:        'Prueba preguntar',
      hint:           'Enter para enviar · Shift+Enter nueva línea',
      welcome:        "¡Hola! Soy tu AI Talent Strategist.\n\nPuedo ayudarte de dos formas:\n\n**Llenar una vacante** — dime qué rol necesitas cubrir y te presento los mejores candidatos internos.\n\n**Desarrollar un empleado** — dime un nombre y te muestro a qué roles puede crecer.\n\n¿Por dónde quieres empezar?",
      quickChips:     ['Llenar una vacante', 'Crecer un empleado', 'Ver vacantes de CS', 'Analizar a Ana Torres'],
      cardClick:      (name) => `Muéstrame opciones de crecimiento para ${name}`,
      posClick:       (title) => `Quiero llenar la vacante de ${title}. Busca candidatos directamente, no listes vacantes.`,
      emptyEmp:       'Ningún empleado coincide con tu búsqueda',
      emptyPos:       'Ninguna vacante coincide con tu búsqueda',
    }
  };

  // ── TRANSLATION MAPS (DB values → EN display) ───────────
  const translations = {
    roles: {
      'SDR Inbound':                   'Inbound SDR',
      'SDR Outbound':                  'Outbound SDR',
      'Senior SDR':                    'Senior SDR',
      'Account Executive':             'Account Executive',
      'Senior Account Executive':      'Senior Account Executive',
      'Enterprise Account Executive':  'Enterprise Account Executive',
      'CS Manager':                    'CS Manager',
      'Senior CS Manager':             'Senior CS Manager',
      'CS Renewals':                   'CS Renewals',
      'Onboarding Specialist':         'Onboarding Specialist',
      'Tech Support L2':               'Tech Support L2',
      'Tech Support L3':               'Tech Support L3',
      'Team Lead SDR':                 'SDR Team Lead',
      'Team Lead CS':                  'CS Team Lead',
      'RevOps Analyst':                'RevOps Analyst',
      'Sales Enablement Specialist':   'Sales Enablement Specialist',
    },
    performance: {
      'Excepcional':           'Exceptional',
      'Alto Desempeño':        'High Performance',
      'Cumple Expectativas':   'Meets Expectations',
      'En Desarrollo':         'Developing',
      'Bajo Desempeño':        'Low Performance',
      'Desempeño Excepcional': 'Exceptional',
    },
    potential: {
      'Alto Potencial':      'High Potential',
      'Potencial Moderado':  'Moderate Potential',
      'Bajo Potencial':      'Low Potential',
    },
    posTitles: {
      'Revenue Operations Manager':               'Revenue Operations Manager',
      'Enterprise Account Executive':             'Enterprise Account Executive',
      'Sales Enablement Lead':                    'Sales Enablement Lead',
      'Technical Implementation Manager':         'Technical Implementation Manager',
      'Demand Generation Specialist':             'Demand Generation Specialist',
      'Director of Customer Success':             'Director of Customer Success',
      'Business Development Representative Lead': 'Business Development Rep Lead',
      'Senior Customer Success Manager':          'Senior Customer Success Manager',
      'Product Marketing Manager':               'Product Marketing Manager',
      'RevOps Senior Analyst':                   'RevOps Senior Analyst',
    },
  };

  function translateRole(role) {
    if (lang === 'es') return role;
    return translations.roles[role] || role;
  }

  function translateNineBox(nb) {
    if (lang === 'es' || !nb) return nb;
    const parts = nb.split('/');
    const perf = parts[0]?.trim() || '';
    const pot  = parts[1]?.trim() || '';
    const perfEN = translations.performance[perf] || perf;
    const potEN  = translations.potential[pot]   || pot;
    return pot ? `${perfEN} / ${potEN}` : perfEN;
  }

  function translatePosTitle(title) {
    if (lang === 'es') return title;
    return translations.posTitles[title] || title;
  }

  function translatePosDesc(text) {
    if (lang === 'es' || !text) return text;
    return text
      .replace(/Unificar/g, 'Unify').replace(/automatizar/g, 'automate')
      .replace(/predecir/g, 'forecast').replace(/identificar/g, 'identify')
      .replace(/Manejar/g, 'Manage').replace(/negociar/g, 'negotiate')
      .replace(/liderar/g, 'lead').replace(/Liderar/g, 'Lead')
      .replace(/Reducir/g, 'Reduce').replace(/crear/g, 'create')
      .replace(/analizar/g, 'analyze').replace(/diseñar/g, 'design')
      .replace(/Diseñar/g, 'Design').replace(/Desarrollar/g, 'Develop')
      .replace(/construir/g, 'build').replace(/Administrar/g, 'Manage')
      .replace(/optimizar/g, 'optimize').replace(/nuevas cuentas/g, 'new accounts')
      .replace(/clientes/g, 'clients').replace(/equipo/g, 'team')
      .replace(/procesos/g, 'processes').replace(/flujos/g, 'workflows')
      .replace(/ingresos/g, 'revenue');
  }

  // ── THEME ───────────────────────────────────────────────
  function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? '' : 'dark');
  }

  // ── LANG ────────────────────────────────────────────────
  function setLang(l) {
    lang = l;
    document.getElementById('lang-en').classList.toggle('active', l === 'en');
    document.getElementById('lang-es').classList.toggle('active', l === 'es');
    const t = i18n[l];
    document.getElementById('chat-title').textContent    = t.chatTitle;
    document.getElementById('chat-subtitle').textContent = t.chatSubtitle;
    document.getElementById('data-title').innerHTML      = t.dataTitle;
    document.getElementById('search-input').placeholder  = currentTab === 'employees' ? t.searchEmp : t.searchPos;
    document.getElementById('stat-emp-label').textContent = t.empLabel;
    document.getElementById('stat-pos-label').textContent = t.posLabel;
    document.getElementById('stat-hp-label').textContent  = t.hpLabel;
    document.getElementById('qp-label').textContent       = t.qpLabel;
    document.getElementById('chat-hint').textContent      = t.hint;
    document.getElementById('tab-employees').textContent  = l === 'en' ? 'Employees' : 'Empleados';
    document.getElementById('tab-positions').textContent  = l === 'en' ? 'Open Positions' : 'Vacantes';
    renderQuickChips();
    renderGrid();
  }

  // ── QUICK CHIPS ─────────────────────────────────────────
  function renderQuickChips() {
    const chips = i18n[lang].quickChips;
    document.getElementById('quick-chips').innerHTML = chips
      .map(c => `<button class="quick-chip" onclick="sendQuick('${c}')">${c}</button>`)
      .join('');
  }

  function sendQuick(text) {
    document.getElementById('chat-input').value = text;
    sendMessage();
  }

  // ── TABS ────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-employees').classList.toggle('active', tab === 'employees');
    document.getElementById('tab-positions').classList.toggle('active', tab === 'positions');
    document.getElementById('search-input').value = '';
    document.getElementById('search-input').placeholder = tab === 'employees'
      ? i18n[lang].searchEmp : i18n[lang].searchPos;
    renderGrid();
  }

  // ── SUPABASE FETCH ──────────────────────────────────────
  async function fetchData() {
    try {
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`
      };
      const [empRes, posRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/employees?select=id,name,role_title,nine_box,hard_skills`, { headers }),
        fetch(`${SUPABASE_URL}/rest/v1/open_positions?is_active=eq.true&select=*`, { headers })
      ]);
      employees = await empRes.json();
      positions = await posRes.json();

      // stats
      document.getElementById('stat-employees').textContent = employees.length;
      document.getElementById('stat-positions').textContent = positions.length;
      const hp = employees.filter(e => e.nine_box && e.nine_box.includes('Alto Potencial')).length;
      document.getElementById('stat-highpot').textContent = hp;

      renderGrid();
    } catch(e) {
      console.error('Supabase fetch error:', e);
    }
  }

  // ── GRID RENDER ─────────────────────────────────────────
  function filterData() { renderGrid(); }

  function renderGrid() {
    const q     = document.getElementById('search-input').value.toLowerCase();
    const grid  = document.getElementById('data-grid');

    if (currentTab === 'employees') {
      const filtered = employees.filter(e =>
        e.name.toLowerCase().includes(q) ||
        e.role_title.toLowerCase().includes(q) ||
        (e.hard_skills && e.hard_skills.toLowerCase().includes(q))
      );

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <div>${i18n[lang].emptyEmp}</div>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(e => {
        const nb = e.nine_box || '';
        const perfBadge = nb.includes('Excepcional') ? 'badge-purple' :
                          nb.includes('Alto Desempeño') ? 'badge-accent' :
                          nb.includes('En Desarrollo') ? 'badge-amber' : 'badge-muted';
        const potBadge  = nb.includes('Alto Potencial') ? 'badge-accent' :
                          nb.includes('Potencial Moderado') ? 'badge-muted' : 'badge-amber';
        const perfLabel = translateNineBox(nb).split('/')[0]?.trim() || '';
        const potLabel  = translateNineBox(nb).split('/')[1]?.trim() || '';
        const displayRole = translateRole(e.role_title);

        return `<div class="card" onclick="cardClick('${e.name}', 'employee')">
          <div class="card-name">${e.name}</div>
          <div class="card-role">${displayRole}</div>
          <div class="card-badges">
            ${perfLabel ? `<span class="badge ${perfBadge}">${perfLabel}</span>` : ''}
            ${potLabel  ? `<span class="badge ${potBadge}">${potLabel}</span>` : ''}
          </div>
        </div>`;
      }).join('');

    } else {
      const filtered = positions.filter(p =>
        p.title.toLowerCase().includes(q) ||
        (p.responsibilities && p.responsibilities.toLowerCase().includes(q)) ||
        (p.soft_skills && p.soft_skills.toLowerCase().includes(q))
      );

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <div>${i18n[lang].emptyPos}</div>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const area = inferArea(p.title);
        const displayTitle = translatePosTitle(p.title);
        const displayDesc  = translatePosDesc(p.responsibilities || '');
        return `<div class="pos-card" onclick="cardClick('${p.title}', 'position')">
          <div class="pos-area">${area}</div>
          <div class="pos-title">${displayTitle}</div>
          <div class="pos-desc">${displayDesc}</div>
        </div>`;
      }).join('');
    }
  }

  function inferArea(title) {
    if (/revenue|revops|ops/i.test(title))         return 'REVENUE OPS';
    if (/customer success|csm/i.test(title))        return 'CUSTOMER SUCCESS';
    if (/enterprise|account exec/i.test(title))     return 'ENTERPRISE SALES';
    if (/enablement/i.test(title))                  return 'SALES ENABLEMENT';
    if (/demand|marketing/i.test(title))            return 'MARKETING';
    if (/implementation|technical/i.test(title))    return 'IMPLEMENTATION';
    if (/business development|bdr/i.test(title))    return 'BUSINESS DEVELOPMENT';
    return 'TALENT';
  }

  function cardClick(name, type) {
    const text = type === 'employee'
      ? i18n[lang].cardClick(name)
      : i18n[lang].posClick(name);
    document.getElementById('chat-input').value = text;
    document.getElementById('chat-input').focus();
    autoResize(document.getElementById('chat-input'));
  }

  // ── CHAT ────────────────────────────────────────────────
  function addMessage(role, text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = formatMessage(text);

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now;

    div.appendChild(bubble);
    div.appendChild(time);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function formatMessage(text) {
    // Convert markdown-ish to HTML
    return text
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/### (.+)/g, '<h3>$1</h3>')
      .replace(/## (.+)/g, '<h3>$1</h3>')
      .replace(/^- (.+)/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(.+)$/, '<p>$1</p>')
      .replace(/<p><\/p>/g, '');
  }

  function setTyping(visible) {
    document.getElementById('typing').classList.toggle('visible', visible);
    document.getElementById('chat-messages').scrollTop =
      document.getElementById('chat-messages').scrollHeight;
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('chat-input');
    const text  = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    addMessage('user', text);

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    setTyping(true);

    try {
      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      const reply = data.response || data.output || 'No response received.';
      setTyping(false);
      addMessage('agent', reply);
    } catch (err) {
      setTyping(false);
      addMessage('agent', 'Connection error. Please check the workflow is active and try again.');
      console.error(err);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── INIT ────────────────────────────────────────────────
  function init() {
    renderQuickChips();
    fetchData();
    const welcome = i18n[lang].welcome;
    addMessage('agent', welcome);
  }

  init();
</script>
</body>
</html>
